<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PMT Link Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .bio {
      padding: 20px;
      border-bottom: 1px solid #333;
    }

    .bio img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
    }

    .bio h1 {
      margin: 10px 0 5px;
    }

    .toggle-btn {
      margin-top: 10px;
      padding: 8px 12px;
      background: #222;
      border: none;
      color: white;
      cursor: pointer;
    }

    .bio-text {
      margin-top: 10px;
      display: none;
    }

    .links {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .links a {
      display: block;
      padding: 15px;
      background: #222;
      text-decoration: none;
      color: white;
      border-radius: 8px;
      text-align: center;
    }

    .links a:hover {
      background: #333;
    }

    /* Desktop layout */
    @media (min-width: 768px) {
      .container {
        flex-direction: row;
      }

      .bio {
        width: 40%;
        border-right: 1px solid #333;
        border-bottom: none;
      }

      .links {
        width: 60%;
      }

      .bio-text {
        display: block !important;
      }

      .toggle-btn {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="bio">
    <img src="https://via.placeholder.com/80" alt="Profile"/>

    <h1>PMT Outdoors</h1>
    <p>Camping | Shooting | Outdoors</p>

    <button class="toggle-btn" onclick="toggleBio()">Show Bio</button>

    <div class="bio-text" id="bioText">
      <p>This is your expandable bio. Keep it short and useful.</p>
      <p>Explain what this brand is about and what people will find in your links.</p>
    </div>
  </div>

  <div class="links">
    <a href="#">Primary Link</a>
    <a href="#">YouTube</a>
    <a href="#">Instagram</a>
    <a href="#">Gear List</a>
    <a href="#">Contact</a>
  </div>

</div>

<script>
  function toggleBio() {
    const bio = document.getElementById("bioText");
    bio.style.display = bio.style.display === "block" ? "none" : "block";
  }
</script>

</body>
</html>
